<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hello Landing Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: #0f172a;
      color: #ffffff;
    }

    header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #020617;
    }

    header h1 {
      font-size: 20px;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #94a3b8;
    }

    nav a:hover {
      color: #ffffff;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .btn {
      padding: 12px 24px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    .btn:hover {
      background: #2563eb;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      color: #64748b;
    }
  </style>
</head>
<body>

  <header>
    <h1>MySite</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div>
      <h2>Hello 👋</h2>
      <p>This is a simple landing page example.</p>
      <button class="btn">Get Started</button>
    </div>
  </section>

  <footer>
    © 2026 MySite. All rights reserved.
  </footer>

</body>
</html>
